<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1F44;
    --navy-2:#122a5c;
    --teal:#00A8A8;
    --teal-2:#0BC7C7;
    --ink:#2B2B2B;
    --line:#E5E7EB;
    --muted:#6B7280;
    --bg:#FFFFFF;
    --bg-soft:#F7F8FB;
  }
  html,body{background:#fff;color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
  body{font-feature-settings:"cv11","ss01"}
  .font-display{font-family:'Manrope','Inter',sans-serif;letter-spacing:-0.02em}
  .font-mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  .slide{min-height:100vh;width:100%;padding:80px;display:flex;flex-direction:column;position:relative;scroll-snap-align:start;border-bottom:1px solid var(--line)}
  .slide-head{display:flex;align-items:center;justify-content:space-between;padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:40px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .slide-head .dot{width:6px;height:6px;border-radius:999px;background:var(--teal);display:inline-block;margin-right:10px;vertical-align:middle}
  .slide-no{position:absolute;right:80px;bottom:32px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
  main{scroll-snap-type:y proximity}
  .nav-item{position:relative;display:flex;align-items:center;gap:10px;padding:7px 0;font-size:12px;color:#9aa3b2;transition:color .2s;cursor:pointer;line-height:1.2}
  .nav-item .idx{font-family:'JetBrains Mono',monospace;font-size:10px;width:22px;color:#6c7588}
  .nav-item .bar{position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:2px;height:0;background:var(--teal);transition:height .25s}
  .nav-item.active{color:#fff}
  .nav-item.active .idx{color:var(--teal)}
  .nav-item.active .bar{height:18px}
  .nav-item:hover{color:#e6ebf3}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--line);border-radius:999px;font-size:12px;color:var(--ink);background:#fff;font-family:'JetBrains Mono',monospace}
  .badge.dark{background:#0B1F44;color:#fff;border-color:#0B1F44}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px}
  .card-soft{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:24px}
  .card-dark{background:var(--navy);color:#fff;border-radius:14px;padding:24px}
  .cite{color:var(--teal);font-family:'JetBrains Mono',monospace;font-size:.75em;vertical-align:super;text-decoration:none;margin-left:2px}
  .cite:hover{text-decoration:underline}
  .h1{font-size:72px;line-height:1.02;letter-spacing:-0.035em;font-weight:800;font-family:'Manrope',sans-serif;color:var(--navy)}
  .h2{font-size:44px;line-height:1.08;letter-spacing:-0.025em;font-weight:700;font-family:'Manrope',sans-serif;color:var(--navy)}
  .h3{font-size:24px;line-height:1.25;letter-spacing:-0.01em;font-weight:700;font-family:'Manrope',sans-serif;color:var(--navy)}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);font-family:'JetBrains Mono',monospace;font-weight:500}
  .stat{font-family:'Manrope',sans-serif;font-weight:700;font-variant-numeric:tabular-nums;color:var(--navy);letter-spacing:-0.02em}
  .grad-navy-teal{background:linear-gradient(120deg,#0B1F44 0%,#113a6e 55%,#00A8A8 130%)}
  .ring-teal{box-shadow:0 0 0 2px rgba(0,168,168,.18), 0 10px 30px -12px rgba(11,31,68,.25)}
  .kbd{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 6px;border:1px solid #2a3558;border-bottom-width:2px;border-radius:4px;color:#cfd6e4;background:#0f1a36}
  /* progress */
  .progress-track{position:fixed;left:0;right:0;bottom:0;height:2px;background:rgba(11,31,68,.06);z-index:50}
  .progress-fill{height:100%;background:linear-gradient(90deg,#0B1F44,#00A8A8);width:0}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:248px;background:#0B1F44;color:#fff;padding:28px 24px 28px 32px;z-index:40;display:flex;flex-direction:column;gap:14px}
  main{margin-left:248px}
  .pn-btn{width:34px;height:34px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;background:#122a5c;color:#cfd6e4;cursor:pointer;transition:background .2s}
  .pn-btn:hover{background:#1a3a7a;color:#fff}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-family:'JetBrains Mono',monospace;background:#F0F4FA;color:var(--navy);border:1px solid #E5EBF5}
  .chip.teal{background:rgba(0,168,168,.1);color:#007575;border-color:rgba(0,168,168,.2)}
  .chip.amber{background:#FFF4E0;color:#8a5a00;border-color:#F5E2B6}
  .chip.red{background:#FEEBEB;color:#8a1f1f;border-color:#F5C4C4}
  .chip.green{background:#E8F6EC;color:#1a6a34;border-color:#C9E8D4}
  .divider{height:1px;background:var(--line);width:100%}
  table.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
  table.tbl th,table.tbl td{padding:14px 16px;text-align:left;vertical-align:top;border-bottom:1px solid var(--line)}
  table.tbl thead th{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;background:#FAFBFD}
  .tick{color:#1a6a34;font-weight:700}
  .cross{color:#8a1f1f;font-weight:700}
  .us-col{background:rgba(0,168,168,.06) !important}
  .ticker{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .arrow{color:var(--teal)}
  .scroll-pill{position:fixed;right:32px;bottom:32px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0B1F44;color:#fff;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:12px;z-index:45}
  .bracket{display:inline-block;border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--navy);background:#fff}
  @media print {
    .sidebar,.progress-track,.scroll-pill{display:none}
    main{margin-left:0}
    .slide{page-break-after:always;min-height:auto}
  }
</style>
</head>

</body>
</html>
